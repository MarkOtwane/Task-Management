<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TaskFlow - Organization Login</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				min-height: 100vh;
				display: grid;
				place-items: center;
				background: linear-gradient(135deg, #e9efff 0%, #d8e4ff 55%, #cedcff 100%);
			}
			.card {
				width: min(460px, 92vw);
				background: #fff;
				border: 1px solid #dbe4ff;
				border-radius: 16px;
				padding: 28px;
				box-shadow: 0 16px 35px rgba(69, 97, 246, 0.15);
			}
			h1 {
				font-size: 1.45rem;
				color: #22327b;
				margin-bottom: 8px;
			}
			p.sub {
				color: #56607a;
				margin-bottom: 18px;
			}
			.group {
				margin-bottom: 14px;
			}
			label {
				display: block;
				margin-bottom: 6px;
				color: #2b365f;
				font-weight: 600;
			}
			input {
				width: 100%;
				padding: 11px 12px;
				border: 1px solid #c7d3ff;
				border-radius: 10px;
				font-size: 0.98rem;
			}
			input:focus {
				outline: none;
				border-color: #5a6ef2;
				box-shadow: 0 0 0 3px rgba(90, 110, 242, 0.14);
			}
			.actions {
				display: flex;
				gap: 10px;
				margin-top: 16px;
			}
			button,
			a.link-btn {
				border: none;
				border-radius: 10px;
				padding: 11px 14px;
				font-weight: 600;
				cursor: pointer;
				text-decoration: none;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
			}
			button {
				background: linear-gradient(135deg, #4561f6, #6b46c1);
				color: #fff;
				flex: 1;
			}
			a.link-btn {
				background: #eef2ff;
				color: #3042a6;
			}
			.meta {
				margin-top: 16px;
				display: flex;
				justify-content: space-between;
				font-size: 0.92rem;
			}
			.meta a {
				color: #3b4ec9;
				text-decoration: none;
			}
			.alert {
				margin-bottom: 14px;
				padding: 10px 12px;
				border-radius: 10px;
				display: none;
			}
			.alert.show {
				display: block;
			}
			.alert.error {
				background: #ffe9e9;
				color: #a31d1d;
				border: 1px solid #f6b2b2;
			}
			.alert.success {
				background: #e9fff1;
				color: #186a3b;
				border: 1px solid #b5ebc9;
			}
			.note {
				margin-top: 14px;
				font-size: 0.85rem;
				color: #6b7280;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1><i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i> Organization Login</h1>
			<p class="sub">Sign in to access your admin or employee dashboard.</p>
			<div id="alert" class="alert"></div>
			<form id="loginForm">
				<div class="group">
					<label for="email">Email</label>
					<input id="email" type="email" required placeholder="you@company.com" />
				</div>
				<div class="group">
					<label for="password">Password</label>
					<input id="password" type="password" required placeholder="Enter your password" />
				</div>
				<div class="actions">
					<button type="submit" id="submitBtn"><i class="fa-solid fa-unlock-keyhole" aria-hidden="true"></i> Login</button>
					<a class="link-btn" href="welcome.html"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back</a>
				</div>
			</form>
			<div class="meta">
				<a href="register.html">Create account</a>
				<a href="index.html">Personal mode</a>
			</div>
			<p class="note">If using Vercel frontend + Render backend, this page uses Render auth API automatically.</p>
		</div>

		<script>
			const BACKEND_ORIGIN = window.location.hostname.includes("vercel.app") ? "https://task-management-bxpk.onrender.com" : "";
			const AUTH_API = `${BACKEND_ORIGIN}/backend/api/auth.php`;

			const form = document.getElementById("loginForm");
			const alertBox = document.getElementById("alert");
			const submitBtn = document.getElementById("submitBtn");

			function showAlert(message, type = "error") {
				alertBox.textContent = message;
				alertBox.className = `alert show ${type}`;
			}

			form.addEventListener("submit", async (e) => {
				e.preventDefault();
				submitBtn.disabled = true;
				submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i> Logging in...';

				try {
					const response = await fetch(`${AUTH_API}?action=login`, {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({
							email: document.getElementById("email").value.trim(),
							password: document.getElementById("password").value,
						}),
					});

					const result = await response.json();
					if (!response.ok || !result.token) {
						throw new Error(result.error || "Login failed");
					}

					const resolvedRole = result.role || localStorage.getItem("preferredRole") || "employee";
					const fallbackName = result.email ? result.email.split("@")[0] : "User";

					localStorage.setItem("token", result.token);
					localStorage.setItem("preferredRole", resolvedRole);
					localStorage.setItem(
						"user",
						JSON.stringify({
							id: result.user_id,
							name: result.name || fallbackName,
							email: result.email || document.getElementById("email").value.trim(),
							role: resolvedRole,
						}),
					);

					showAlert("Login successful. Redirecting...", "success");
					window.location.href = resolvedRole === "admin" ? "admin-dashboard.html" : "employee-dashboard.html";
				} catch (err) {
					showAlert(err.message || "Unable to login.");
				} finally {
					submitBtn.disabled = false;
					submitBtn.innerHTML = '<i class="fa-solid fa-unlock-keyhole" aria-hidden="true"></i> Login';
				}
			});
		</script>
	</body>
</html>
